<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gallery | Noretsoret CU</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f6f9;
}

/* HEADER */
header{
    background:#1e3c72;
    padding:15px;
    color:white;
    position:fixed;
    width:100%;
    top:0;
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    width:90%;
    margin:auto;
}

nav ul{
    list-style:none;
    display:flex;
    gap:20px;
}

nav ul li a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

nav ul li a:hover{
    color:gold;
}

/* CONTAINER */
.container{
    max-width:1100px;
    margin:auto;
    padding:120px 20px 60px 20px;
    text-align:center;
}

h2{
    margin-bottom:30px;
    color:#1e3c72;
}

/* GALLERY GRID */
.gallery-container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
}

/* IMAGE STYLE */
.gallery-container img{
    width:100%;
    height:auto;              /* shows whole image */
    object-fit:contain;       /* ensures full image visible */
    border-radius:10px;
    background:white;
    padding:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
    transition:0.3s ease;
}

.gallery-container img:hover{
    transform:scale(1.03);
}

/* FOOTER */
footer{
    background:#1e3c72;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:50px;
}
</style>
</head>

<body>

<header>
<nav>
<img src="./images/soret.png" height="45" alt="Noretsoret Logo">
<ul>
<li><a href="index.html">Home</a></li>
</ul>
</nav>
</header>

<section id="gallery">
<div class="container">
<h2>Gallery</h2>

<div class="gallery-container">
<img src="./images/22.jpeg" alt="Photo 1">
<img src="./images/25.jpeg" alt="Photo 2">
<img src="./images/19.jpeg" alt="Photo 3">
<img src="./images/23.jpeg" alt="Photo 4">
<img src="./images/26.jpeg" alt="Photo 5">
<img src="./images/24.jpeg" alt="Photo 6">
<img src="./images/16.jpeg" alt="Photo 7">
</div>

</div>
</section>

<footer>
<p>© 2026 Noretsoret</p>
</footer>

</body>
</html>
